# PowerSync Sync Rules for ReadyBoard
# v5.3 — Units + area hierarchy + no subqueries
#
# Rules: data queries = single table, no JOINs, no subqueries.
# Parameter queries = single table, no JOINs, no subqueries.
# Use bucket.param to reference parameter values in data WHERE clauses.
#
# Deploy to PowerSync Dashboard (powersync.journeyapps.com)

bucket_definitions:
  # ── Bucket 1: User-scoped ──
  by_user:
    parameters:
      - SELECT token_parameters.user_id as user_id

    data:
      - SELECT id, email, phone, name, role, language, org_id
        FROM users
        WHERE id = bucket.user_id

      - SELECT id, user_id, area_id, trade_name
        FROM user_assignments
        WHERE user_id = bucket.user_id

  # ── Bucket 2: Area-scoped (one instance per assigned area) ──
  by_area:
    parameters:
      - SELECT area_id FROM user_assignments
        WHERE user_id = token_parameters.user_id

    data:
      - SELECT id, name, floor, area_type, project_id, total_sqft, original_sqft,
               unit_id, area_code, description, sort_order, created_at
        FROM areas
        WHERE id = bucket.area_id

      - SELECT id, area_id, trade_type, reporting_mode,
               manual_pct, calculated_pct, effective_pct,
               all_gates_passed, gc_verification_pending,
               gc_verification_pending_since, updated_at
        FROM area_trade_status
        WHERE area_id = bucket.area_id

      - SELECT id, area_id, user_id, trade_name, status, progress_pct,
               reason_code, gps_lat, gps_lng, photo_url,
               device_id, app_version, offline_created_at, created_at
        FROM field_reports
        WHERE area_id = bucket.area_id

      - SELECT id, area_id, trade_type, task_template_id, task_order,
               task_name_en, task_name_es, task_owner, is_gate, weight,
               status, completed_at, completed_by, completed_by_role,
               photo_url, notes, gps_lat, gps_lon,
               verification_requested_at, notification_sent_at,
               notification_opened_at, reminder_sent_at, escalation_flagged_at,
               correction_reason, correction_note,
               correction_requested_at, correction_requested_by,
               correction_resolved_at, updated_at
        FROM area_tasks
        WHERE area_id = bucket.area_id

      - SELECT id, area_id, trade_name, reason_code, started_at, ended_at,
               man_hours, daily_cost, cumulative_cost, crew_size,
               nod_draft_id, rea_id, receipt_confirmed
        FROM delay_logs
        WHERE area_id = bucket.area_id

  # ── Bucket 3: Project-scoped (via project_members — has user_id + project_id) ──
  by_project:
    parameters:
      - SELECT project_id FROM project_members
        WHERE user_id = token_parameters.user_id

    data:
      - SELECT id, name, address, labor_rate_per_hour, legal_jurisdiction,
               sha256_enabled, gc_org_id, sub_org_id, created_at
        FROM projects
        WHERE id = bucket.project_id

      - SELECT id, project_id, area_type, trade_name, sequence_order
        FROM trade_sequences
        WHERE project_id = bucket.project_id

      - SELECT id, project_id, floor, name, unit_type, sort_order,
               created_at, updated_at
        FROM units
        WHERE project_id = bucket.project_id
